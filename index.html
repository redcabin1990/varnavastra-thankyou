<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | VarnaVastra</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #fbe4ec, #fff7f9);
    overflow: hidden;
    text-align: center;
    color: #7a2e4d;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(rgba(122,46,77,0.08) 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 2;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: 10vh auto;
    animation: fadeIn 2s ease-in-out;
}

.logo {
    width: 120px;
    margin-bottom: 15px;
}

h1 {
    font-size: 26px;
    margin-bottom: 15px;
}

p {
    font-size: 15px;
    line-height: 1.6;
}

.brand {
    margin-top: 15px;
    font-weight: bold;
    letter-spacing: 2px;
}

#surpriseBtn {
    display: none;
    margin-top: 25px;
    padding: 10px 20px;
    background: #7a2e4d;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

#surpriseBtn:hover {
    background: #a13d66;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.petal, .confetti {
    position: absolute;
    top: -20px;
    width: 10px;
    height: 10px;
    opacity: 0.8;
}

@keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); }
}

@keyframes burst {
    to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>

<body>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="Zara zara.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <img src="logo.png" class="logo" alt="VarnaVastra Logo">

    <h1>Thank You 💛</h1>
    <p>
        In just one month,<br>
        you have filled our journey with love and trust.<br><br>
        Every order, every blessing, every message
        means the world to us.
    </p>

    <div class="brand">✨ VarnaVastra ✨</div>

    <button id="surpriseBtn"
        onclick="window.location.href='https://instagram.com/varnavastra4you'">
        🎁 Visit Our Instagram
    </button>
</div>

<script>

/* Start Music On First Tap */
document.addEventListener("click", function () {
    document.getElementById("bgMusic").play();
}, { once: true });

/* Falling Petals */
for (let i = 0; i < 25; i++) {
    let petal = document.createElement("div");
    petal.classList.add("petal");
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animation = "fall " + (5 + Math.random() * 5) + "s linear infinite";
    petal.style.background = ["#f8c8dc","#f4a6c1","#ffd1dc"][Math.floor(Math.random()*3)];
    document.body.appendChild(petal);
}

/* Confetti Celebration Burst */
setTimeout(() => {
    for (let i = 0; i < 40; i++) {
        let conf = document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = ["#ff4d6d","#ff99c8","#ffd6a5","#cdb4db"][Math.floor(Math.random()*4)];
        conf.style.animation = "burst 4s linear forwards";
        document.body.appendChild(conf);
    }
}, 3000);

/* Show Button After 6 Seconds */
setTimeout(() => {
    document.getElementById("surpriseBtn").style.display = "inline-block";
}, 6000);

/* Auto Redirect After 12 Seconds */
setTimeout(() => {
    window.location.href = "https://instagram.com/varnavastra4you";
}, 12000);

</script>

</body>
</html>
