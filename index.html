<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | VarnaVastra</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #fbe4ec, #fff7f9);
    overflow: hidden;
    text-align: center;
    color: #7a2e4d;
}

/* Subtle Saree Pattern Overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(rgba(122,46,77,0.08) 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: 0;
}

/* Main Container */
.container {
    position: relative;
    z-index: 2;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: 15vh auto;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 28px;
    margin-bottom: 15px;
}

p {
    font-size: 16px;
    line-height: 1.6;
}

.brand {
    margin-top: 20px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* Hidden Surprise Button */
#surpriseBtn {
    display: none;
    margin-top: 25px;
    padding: 10px 20px;
    background: #7a2e4d;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
}

#surpriseBtn:hover {
    background: #a13d66;
}

/* Fade In Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Falling Petals */
.petal {
    position: absolute;
    top: -50px;
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>Thank You 💛</h1>
    <p>
        In just one month,<br>
        you have filled our journey with love and trust.<br><br>
        Every order, every blessing, every message
        means the world to us.
    </p>
    <div class="brand">
        ✨ VarnaVastra ✨
    </div>

    <button id="surpriseBtn" onclick="alert('A Special Thank You Offer is Coming Tomorrow 💛')">
        🎁 Surprise Coming Soon
    </button>
</div>

<script>
/* Create Falling Petals */
for (let i = 0; i < 25; i++) {
    let petal = document.createElement("div");
    petal.classList.add("petal");
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (5 + Math.random() * 5) + "s";
    petal.style.background = ["#f8c8dc","#f4a6c1","#ffd1dc"][Math.floor(Math.random()*3)];
    document.body.appendChild(petal);
}

/* Show Surprise Button After 6 Seconds */
setTimeout(() => {
    document.getElementById("surpriseBtn").style.display = "inline-block";
}, 6000);
</script>

</body>
</html>
